<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тут&amp;Зараз — CRM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen" class="screen">
  <form id="loginForm" class="login-card">
    <h1>Тут<span class="amp">&amp;</span>Зараз</h1>
    <p class="login-sub">Вхід у панель</p>
    <label>
      Пароль адміністратора
      <input type="password" id="loginPassword" required autofocus>
    </label>
    <button type="submit" class="btn">Увійти</button>
    <p id="loginError" class="error"></p>
  </form>
</div>

<div id="appScreen" class="screen" hidden>
  <header class="topbar">
    <h1>Тут<span class="amp">&amp;</span>Зараз</h1>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="orders">Заявки</button>
      <button class="tab-btn" data-tab="inbox">Повідомлення <span class="unread-badge" id="unreadBadge" hidden>0</span></button>
    </nav>
    <button id="logoutBtn" class="btn btn-ghost">Вийти</button>
  </header>

  <!-- ===== ЗАЯВКИ ===== -->
  <section id="ordersTab" class="tab-panel">
    <div class="panel-toolbar">
      <select id="filterSource">
        <option value="">Усі канали</option>
        <option value="website">Сайт</option>
        <option value="phone">Телефонія</option>
      </select>
      <select id="filterStatus">
        <option value="">Усі статуси</option>
        <option value="new">Нова</option>
        <option value="confirmed">Підтверджена</option>
        <option value="cooking">Готується</option>
        <option value="delivering">В дорозі</option>
        <option value="done">Виконана</option>
        <option value="cancelled">Скасована</option>
      </select>
      <button id="refreshOrdersBtn" class="btn btn-ghost">Оновити</button>
    </div>
    <table class="orders-table">
      <thead>
        <tr>
          <th>№</th><th>Канал</th><th>Клієнт</th><th>Телефон</th>
          <th>Адреса</th><th>Склад</th><th>Сума</th><th>Створено</th><th>Статус</th>
        </tr>
      </thead>
      <tbody id="ordersBody"></tbody>
    </table>
    <p id="ordersEmptyState" class="empty" hidden>Заявок не знайдено.</p>
  </section>

  <!-- ===== ПОВІДОМЛЕННЯ (ІНБОКС) ===== -->
  <section id="inboxTab" class="tab-panel" hidden>
    <div class="inbox-layout">
      <div class="conversation-list">
        <div class="panel-toolbar">
          <button id="refreshInboxBtn" class="btn btn-ghost btn-small">Оновити</button>
        </div>
        <ul id="conversationItems"></ul>
        <p id="inboxEmptyState" class="empty" hidden>Повідомлень ще немає.</p>
      </div>
      <div class="conversation-thread" id="threadPanel">
        <p class="thread-placeholder">Оберіть розмову зліва, щоб побачити переписку.</p>
      </div>
    </div>
  </section>
</div>

<script src="app.js"></script>
</body>
</html>
